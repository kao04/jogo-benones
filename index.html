<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minijogo Isométrico - Coleta</title>
    <style>
        /* ==========================================================================
           ESTILOS (CSS) - Aparência e Pixel Art
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            /* Fonte estilo retro/pixel art */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            background-color: #000;
        }

        /* Aplica o filtro de pixel art para que as imagens não fiquem borradas ao redimensionar */
        canvas {
            display: block;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* --- Telas da Interface --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        /* --- Menu Principal --- */
        #menu-screen h1 {
            color: #f1c40f;
            text-shadow: 4px 4px 0 #d35400;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.5;
        }

        .character-card {
            background-color: #333;
            border: 4px solid #fff;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }

        .character-card:hover, .character-card.selected {
            transform: scale(1.05);
            border-color: #f1c40f;
        }
        .character-card.selected {
            background-color: #8e44ad;
        }

        .character-card img {
            width: 100px;
            height: 100px;
            image-rendering: pixelated;
            margin-bottom: 10px;
            background-color: #555;
            border: 2px solid #222;
        }

        /* --- HUD (Debug) --- */
        #debug-hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #fff;
            font-size: 10px;
            line-height: 1.8;
            pointer-events: none;
            /* Deixa o clique passar através do HUD */
            z-index: 5;
        }

        #debug-hud span {
            color: #e74c3c;
        }

        #debug-hud span.collected {
            color: #2ecc71;
        }

        /* --- Inventário (Modal) --- */
        #inventory-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            background-color: #2c3e50;
            border: 6px solid #ecf0f1;
            padding: 20px;
            z-index: 20;
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.5);
        }

        .inventory-header {
            text-align: center;
            border-bottom: 4px dashed #7f8c8d;
            padding-bottom: 15px;
            margin-bottom: 20px;
            color: #f1c40f;
        }

        .inventory-content {
            display: flex;
            gap: 20px;
        }

        .portrait-container {
            flex: 0 0 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .portrait-container img {
            width: 100px;
            height: 100px;
            border: 4px solid #fff;
            image-rendering: pixelated;
            background-color: #000;
        }

        .items-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item-slot {
            background-color: #34495e;
            border: 2px solid #7f8c8d;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 12px;
        }

        .item-slot img {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
            filter: grayscale(100%) opacity(0.3);
            /* Cinza se não coletado */
        }

        .item-slot.active img {
            filter: none;
            /* Colorido se coletado */
        }

        .item-slot.active {
            border-color: #f1c40f;
            background-color: #2c3e50;
        }

        .inventory-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #bdc3c7;
        }
    </style>
</head>

<body>

    <div id="game-wrapper">
        <!-- Tela de Menu Inicial -->
        <div id="menu-screen" class="screen">
            <h1>SELEÇÃO DE<br>PROTAGONISTAS</h1>
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div class="character-card selected" data-char="prota">
                <img src="assets/prota.png" alt="Protagonista">
                <div>PROTA</div>
            </div>
            <div class="character-card" data-char="menina1">
                <img src="assets/menina1.png" alt="Menina 1">
                <div>MENINA 1</div>
            </div>
            <div class="character-card" data-char="menina2">
                <img src="assets/menina2.png" alt="Menina 2">
                <div>MENINA 2</div>
            </div>
        </div>
        <button id="btn-start-game" style="padding: 15px 30px; font-family: inherit; font-size: 16px; background: #f1c40f; color: #000; border: 4px solid #fff; cursor: pointer;">INICIAR JOGO</button>
        </div>

        <!-- Tela do Jogo -->
        <div id="game-ui" class="hidden">
            <!-- Canvas onde o jogo é renderizado -->
            <canvas id="gameCanvas" width="800" height="600"></canvas>

            <!-- HUD de Debug (Sempre visível no canto superior esquerdo) -->
            <div id="debug-hud">
                <div>DEBUG INFO</div>
                <div style="margin-bottom: 5px; border-bottom: 1px solid #fff; padding-bottom: 5px;"></div>
                <div>POS X: <span id="hud-x">0</span></div>
                <div>POS Y: <span id="hud-y">0</span></div>
                <div style="margin-top: 5px;">ÓCULOS: <span id="hud-glasses">NÃO</span></div>
                <div>PANO: <span id="hud-cloth">NÃO</span></div>
                <div style="margin-top: 10px; font-size: 8px; color:#aaa;">Pressione 'E' para Inventário</div>
            </div>

            <!-- Modal de Inventário (Pressione 'E') -->
            <div id="inventory-modal" class="hidden">
                <div class="inventory-header">
                    <h2>INVENTÁRIO</h2>
                </div>
                <div class="inventory-content">
                    <div class="portrait-container">
                        <img id="inv-portrait" src="" alt="Retrato">
                        <div style="margin-top: 10px; font-size: 12px;">Herói</div>
                    </div>
                    <div class="items-container">
                        <div class="item-slot" id="slot-glasses">
                            <img id="inv-glasses" src="" alt="Óculos">
                            <div>Óculos Místicos</div>
                        </div>
                        <div class="item-slot" id="slot-cloth">
                            <img id="inv-cloth" src="" alt="Pano">
                            <div>Pano de Limpeza</div>
                        </div>
                    </div>
                </div>
                <div class="inventory-footer">
                    [E] para fechar
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================================================
           🛠️ ÁREA DE CONFIGURAÇÃO DE IMAGENS (SUBSTITUA AS URLs AQUI) 🛠️
           ========================================================================== 
           Instruções:
           - Troque as strings entre aspas pelas URLs das suas imagens (ex: "img/mapa.png").
           - Certifique-se de que as imagens do jogador e itens tenham fundo transparente (PNG).
           - Por padrão, estou usando imagens vetoriais (SVG Data URIs) geradas no código
             apenas para que o jogo funcione imediatamente como um protótipo visual.
           ========================================================================== */

        const IMAGE_URLS = {
            mapBackground: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MDAiIGhlaWdodD0iNjAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjN2ZiODA1Ii8+PHBhdGggZD0iTTAgMzAwbDQwMC0yMDBsNDAwIDIwMGwtNDAwIDIwMHoiIGZpbGw9IiM2N2E2MDUiIG9wYWNpdHk9IjAuNSIvPjxwYXRoIGQ9Ik0wIDE1MGw0MDAtMjAwbDQwMCAyMDBsLTQwMCAyMDB6IiBmaWxsPSIjN2ZiODA1IiBvcGFjaXR5PSIwLjMiIGZpbGwtcnVsZT0iZXZlbm9kZCIvPjwvc3ZnPg==",
            itemGlasses: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSIxNSI+PHJlY3QgeD0iMiIgeT0iMiIgd2lkdGg9IjEwIiBoZWlnaHQ9IjEwIiBmaWxsPSJ0cmFuc3BhcmVudCIgc3Ryb2tlPSIjMDAwIiBzdHJva2Utd2lkdGg9IjQiLz48cmVjdCB4PSIxOCIgeT0iMiIgd2lkdGg9IjEwIiBoZWlnaHQ9IjEwIiBmaWxsPSJ0cmFuc3BhcmVudCIgc3Ryb2tlPSIjMDAwIiBzdHJva2Utd2lkdGg9IjQiLz48cmVjdCB4PSIxMiIgeT0iNCIgd2lkdGg9IjYiIGhlaWdodD0iNCIgZmlsbD0iIzAwMCIvPjwvc3ZnPg==",
            itemCloth: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSIyMCI+PHJlY3QgeD0iNCIgeT0iMiIgd2lkdGg9IjIyIiBoZWlnaHQ9IjE2IiBmaWxsPSIjZWNmMGYxIi8+PHJlY3QgeD0iNiIgeT0iNCIgd2lkdGg9IjE4IiBoZWlnaHQ9IjQiIGZpbGw9IiNlNzRjM2MiLz48L3N2Zz4=",
            
            // Novas Imagens Locais Substituídas
            prota: "assets/prota.png",
            protaGlasses: "assets/protaoculos.png",
            menina1: "assets/menina1.png",
            menina2: "assets/menina2.png"
        };
        
        let selectedChar = 'prota'; // Personagem selecionado
        // ==========================================================================

        /* --- Variáveis do Jogo --- */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Objeto para armazenar as imagens carregadas
        const assets = {};
        let imagesLoaded = 0;
        const totalImages = Object.keys(IMAGE_URLS).length;

        // Estado do Jogo
        let gameState = 'MENU'; // 'MENU', 'PLAYING', 'INVENTORY'
        const keys = {}; // Guarda o estado das teclas pressionadas

        // Jogador
        const player = {
            x: 380, // Posição inicial centralizada
            y: 280,
            width: 40,  // Largura do sprite (ajuste conforme a sua imagem)
            height: 60, // Altura do sprite (ajuste conforme a sua imagem)
            speed: 4
        };

        // Coletáveis (Posições fixas no mapa isométrico estático)
        const items = {
            glasses: {
                x: 200, y: 150, width: 30, height: 15,
                collected: false
            },
            cloth: {
                x: 600, y: 400, width: 30, height: 20,
                collected: false
            }
        };

        /* --- Referências da Interface (DOM) --- */
        const ui = {
            menuScreen: document.getElementById('menu-screen'),
            gameUi: document.getElementById('game-ui'),
            inventoryModal: document.getElementById('inventory-modal'),
            hudX: document.getElementById('hud-x'),
            hudY: document.getElementById('hud-y'),
            hudGlasses: document.getElementById('hud-glasses'),
            hudCloth: document.getElementById('hud-cloth'),
            slotGlasses: document.getElementById('slot-glasses'),
            slotCloth: document.getElementById('slot-cloth'),
            invPortrait: document.getElementById('inv-portrait')
        };

        /* --- Inicialização e Carregamento --- */
        function init() {
            // Carrega todas as imagens antes de iniciar
            for (let key in IMAGE_URLS) {
                assets[key] = new Image();
                assets[key].onload = () => {
                    imagesLoaded++;
                    if (imagesLoaded === totalImages) {
                        setupInterface();
                    }
                };
                assets[key].src = IMAGE_URLS[key];
            }

            // Eventos de Teclado
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;

                // Sistema de Inventário (Tecla 'E')
                if (e.key.toLowerCase() === 'e') {
                    toggleInventory();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
            });

            // Evento de Seleção de Personagens no Menu
            const charCards = document.querySelectorAll('.character-card');
            charCards.forEach(card => {
                card.addEventListener('click', () => {
                    charCards.forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedChar = card.dataset.char;
                    // Atualiza o portrait no inventário preventivamente
                    ui.invPortrait.src = IMAGE_URLS[selectedChar];
                });
            });

            // Evento de Clique no Botão Start
            document.getElementById('btn-start-game').addEventListener('click', startGame);
        }

        function setupInterface() {
            // Popula as imagens do DOM com as URLs configuradas
            ui.invPortrait.src = IMAGE_URLS[selectedChar];
            document.getElementById('inv-glasses').src = IMAGE_URLS.itemGlasses;
            document.getElementById('inv-cloth').src = IMAGE_URLS.itemCloth;
        }

        /* --- Funções de Estado --- */
        function startGame() {
            ui.menuScreen.classList.add('hidden');
            ui.gameUi.classList.remove('hidden');
            gameState = 'PLAYING';
            gameLoop(); // Inicia o loop principal
        }

        function toggleInventory() {
            // Só permite abrir se estiver jogando ou já estiver no inventário
            if (gameState === 'PLAYING') {
                gameState = 'INVENTORY';
                ui.inventoryModal.classList.remove('hidden');
                updateInventoryUI();
            } else if (gameState === 'INVENTORY') {
                gameState = 'PLAYING';
                ui.inventoryModal.classList.add('hidden');
                // Como as teclas podem bugar durante o pause do overlay, resetamos
                for (let k in keys) keys[k] = false;
            }
        }

        /* --- Lógica de Colisão (AABB - Bounding Box) --- */
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        /* --- Lógica de Atualização (Física e Input) --- */
        function update() {
            if (gameState !== 'PLAYING') return;

            // Movimentação (WASD ou Setas)
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // Limites da Câmera/Mapa (O jogador não pode sair da tela)
            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

            // Checar coleta de itens
            if (!items.glasses.collected && checkCollision(player, items.glasses)) {
                items.glasses.collected = true;
                updateHud();
            }

            if (!items.cloth.collected && checkCollision(player, items.cloth)) {
                items.cloth.collected = true;
                updateHud();
            }

            updateHud(); // Atualiza posições X e Y a cada frame
        }

        /* --- Renderização Gráfica --- */
        function draw() {
            // 1. Limpa o canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. Desenha o Background Isométrico Estático
            ctx.drawImage(assets.mapBackground, 0, 0, canvas.width, canvas.height);

            // 3. Desenha Itens (Se não foram coletados)
            if (!items.glasses.collected) {
                ctx.drawImage(assets.itemGlasses, items.glasses.x, items.glasses.y, items.glasses.width, items.glasses.height);
            }
            if (!items.cloth.collected) {
                ctx.drawImage(assets.itemCloth, items.cloth.x, items.cloth.y, items.cloth.width, items.cloth.height);
            }

            // 4. Desenha o Jogador
            let currentPlayerImage = assets[selectedChar];
            
            // Se pegou óculos e é o prota, muda pro prota de óculos
            if (selectedChar === 'prota' && items.glasses.collected) {
                currentPlayerImage = assets.protaGlasses;
            }

            ctx.drawImage(currentPlayerImage, player.x, player.y, player.width, player.height);
        }

        /* --- Atualizações de Interface --- */
        function updateHud() {
            // Atualiza Coordenadas
            ui.hudX.innerText = Math.round(player.x);
            ui.hudY.innerText = Math.round(player.y);

            // Atualiza Status de Coleta (Óculos)
            if (items.glasses.collected) {
                ui.hudGlasses.innerText = "SIM";
                ui.hudGlasses.className = "collected";
            }

            // Atualiza Status de Coleta (Pano)
            if (items.cloth.collected) {
                ui.hudCloth.innerText = "SIM";
                ui.hudCloth.className = "collected";
            }
        }

        function updateInventoryUI() {
            // Atualiza retrato se for prota com óculos
            if (selectedChar === 'prota' && items.glasses.collected) {
                ui.invPortrait.src = IMAGE_URLS.protaGlasses;
            }

            // Destaca no inventário se o item foi coletado
            if (items.glasses.collected) {
                ui.slotGlasses.classList.add('active');
            }
            if (items.cloth.collected) {
                ui.slotCloth.classList.add('active');
            }
        }

        /* --- Loop Principal --- */
        function gameLoop() {
            update();
            draw();
            // Chama o próximo frame
            requestAnimationFrame(gameLoop);
        }

        // Inicia o processo quando a página carregar
        window.onload = init;

    </script>
</body>

</html>
